<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Reconciliation · MobileShop OS</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="digital-recon">
  <div class="layout"><aside id="sidebar"></aside><div class="main"><header id="topbar"></header><main class="content">
    <div class="page-head">
      <div><h1>Digital Services — Reconciliation</h1><div class="subtitle">Compare counted cash and provider app balances against prototype records.</div></div>
      <div class="actions"><a class="btn" href="digital-balances.html">Balances</a><a class="btn btn-primary" href="digital-services.html">New transaction</a></div>
    </div>
    <div class="grid cols-4" id="summary" style="margin-bottom:18px"></div>
    <div class="card">
      <div class="card-head"><h3>Counted balances</h3><span class="hint">Variance reason is required before saving if any row does not match.</span></div>
      <div class="card-pad">
        <div id="countRows"></div>
        <div class="field-row" style="margin-top:14px">
          <div class="field"><label>Reason for variance</label><textarea class="input" id="reason" rows="2"></textarea></div>
          <div class="field" style="max-width:260px"><label>Cashier</label><input class="input" id="cashier"></div>
        </div>
        <button class="btn btn-primary" id="saveBtn">Save reconciliation</button>
      </div>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="card-head"><h3>Saved reconciliations</h3></div>
      <div class="table-wrap"><table class="data"><thead><tr><th>ID</th><th>Timestamp</th><th>Cashier</th><th>Reason</th><th>Variances</th></tr></thead><tbody id="savedRows"></tbody></table></div>
    </div>
  </main></div></div>
  <script src="assets/data.js"></script><script src="assets/digital.js"></script><script src="assets/shell.js"></script>
  <script>
    var state=Digital.load(), balances=Digital.balanceSummary();
    function $(id){return document.getElementById(id);}
    function card(l,v,cls){return '<div class="kpi"><div class="label">'+l+'</div><div class="value '+(cls||"")+'">'+v+'</div><div class="meta">digital services only</div></div>';}
    function renderSummary(){
      var tx=state.digitalServiceTransactions, settled=tx.filter(function(t){return t.status==="SUCCESSFUL";});
      var pending=tx.filter(function(t){return t.status==="PENDING";});
      var reversed=tx.filter(function(t){return t.status==="REVERSED";});
      var missing=tx.filter(function(t){return t.status==="SUCCESSFUL"&&!t.providerTransactionId;});
      var earn=Digital.totals({settledOnly:true}).netEarnings;
      var cash=balances.find(function(b){return b.key==="physicalCash";});
      $("summary").innerHTML=card("Expected physical cash impact",Digital.pkr((cash.received||0)-(cash.sent||0)))+card("Successful transactions",settled.length)+card("Pending transactions",pending.length,pending.length?"warn-text":"")+card("Reversed transactions",reversed.length,reversed.length?"neg-text":"")+card("Missing provider references",missing.length,missing.length?"neg-text":"")+card("Calculated service earnings",Digital.pkr(earn),earn>=0?"pos-text":"neg-text");
    }
    function renderCounts(){
      $("cashier").value=DB.SHOP.owner||"Cashier";
      $("countRows").innerHTML=balances.map(function(b){
        return '<div class="kv" data-key="'+b.key+'"><span class="k">'+b.service+' expected <b>'+Digital.pkr(b.current)+'</b></span><span class="v" style="min-width:230px"><input class="input count-input" data-key="'+b.key+'" type="number" min="0" value="'+b.current+'"><span class="badge plain" id="var-'+b.key+'" style="margin-left:8px">Balanced</span></span></div>';
      }).join("");
      document.querySelectorAll(".count-input").forEach(function(i){i.addEventListener("input",updateVariance);});
      updateVariance();
    }
    function collect(){
      var variances={}, any=false;
      document.querySelectorAll(".count-input").forEach(function(i){
        var b=balances.find(function(x){return x.key===i.dataset.key;});
        var counted=Digital.num(i.value), variance=counted-b.current;
        variances[i.dataset.key]={expected:b.current,counted:counted,variance:variance};
        if(variance!==0)any=true;
      });
      return {variances:variances, any:any};
    }
    function updateVariance(){
      var c=collect();
      Object.keys(c.variances).forEach(function(k){var v=c.variances[k].variance, el=$("var-"+k); el.textContent=v===0?"Balanced":(v>0?"Over ":"Short ")+Digital.pkr(Math.abs(v)); el.className="badge "+(v===0?"pos":v>0?"warn":"neg");});
    }
    function renderSaved(){
      $("savedRows").innerHTML=(state.digitalServiceReconciliations||[]).map(function(r){
        var parts=Object.keys(r.variances||{}).filter(function(k){return r.variances[k].variance!==0;}).map(function(k){return k+": "+Digital.pkr(r.variances[k].variance);}).join(", ")||"Balanced";
        return '<tr><td class="mono">'+r.id+'</td><td>'+Digital.dateText(r.createdAt)+'</td><td>'+r.cashierName+'</td><td>'+r.reason+'</td><td>'+parts+'</td></tr>';
      }).join("")||'<tr><td colspan="5" class="empty">No reconciliations saved yet.</td></tr>';
    }
    $("saveBtn").onclick=function(){
      var c=collect(), reason=$("reason").value.trim();
      if(c.any&&!reason){Shell.toast("Variance reason is required.",false);$("reason").focus();return;}
      Digital.saveReconciliation({cashierName:$("cashier").value||DB.SHOP.owner,reason:reason||"Balanced",variances:c.variances});
      state=Digital.load(); $("reason").value=""; renderSaved(); Shell.toast("Digital reconciliation saved",true);
    };
    renderSummary(); renderCounts(); renderSaved();
  </script>
</body>
</html>
