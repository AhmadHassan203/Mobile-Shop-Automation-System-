name: mobileshop-os

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?Set POSTGRES_SUPERUSER_PASSWORD in a git-ignored env file}
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C
      MOBILESHOP_APP_DB_PASSWORD: ${MOBILESHOP_APP_DB_PASSWORD:?Set MOBILESHOP_APP_DB_PASSWORD in a git-ignored env file}
      MOBILESHOP_MIGRATOR_DB_PASSWORD: ${MOBILESHOP_MIGRATOR_DB_PASSWORD:?Set MOBILESHOP_MIGRATOR_DB_PASSWORD in a git-ignored env file}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PostgreSQL 18+ stores PGDATA below this version-neutral parent. Mounting
      # the old /var/lib/postgresql/data path would not persist the real cluster.
      - postgres_data:/var/lib/postgresql
      # Reuse the same idempotent role/database policy as native PostgreSQL.
      - ./scripts/provision-database.sql:/docker-entrypoint-initdb.d/10-provision-database.sql:ro
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    shm_size: 256mb
    stop_grace_period: 30s
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - data

  # Optional same-origin entry point for local production-shape testing. The
  # frontend and API still run on the host until their Dockerfiles are added.
  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROXY_PORT:-8080}:8080"
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8080/proxy-health",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - edge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  data:
    internal: true
  edge:
